<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Redirecting - MicroHub</title>
  <meta http-equiv="refresh" content="0; url=https://repair.microhub.in/register">
  <meta name="robots" content="noindex">
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: Inter, sans-serif;
      background: linear-gradient(135deg, #071a17 0%, #0f172a 58%, #0f1f1c 100%);
      color: #f8fafc;
    }

    .redirect-card {
      width: min(92vw, 540px);
      padding: 2rem;
      border-radius: 24px;
      background: rgba(15, 23, 42, 0.74);
      border: 1px solid rgba(148, 163, 184, 0.22);
      box-shadow: 0 24px 60px rgba(15, 23, 42, 0.28);
      text-align: center;
    }

    h1 {
      margin: 0 0 0.75rem;
      font-size: 1.5rem;
      line-height: 1.1;
    }

    p {
      margin: 0;
      color: rgba(226, 232, 240, 0.82);
      line-height: 1.65;
    }

    a {
      color: #2dd4bf;
      font-weight: 700;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="redirect-card">
    <h1>Redirecting to MicroHub registration</h1>
    <p>
      If you are not redirected automatically,
      <a href="https://repair.microhub.in/register">continue here</a>.
    </p>
  </div>
  <script>
    window.location.replace('https://repair.microhub.in/register');
  </script>
</body>
</html>
